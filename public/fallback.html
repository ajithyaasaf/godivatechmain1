<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GodivaTech - Loading...</title>
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: #f8f9fa;
      color: #333;
      text-align: center;
    }
    .container {
      max-width: 800px;
      padding: 2rem;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      color: #1a56db;
    }
    p {
      font-size: 1.1rem;
      line-height: 1.5;
      margin-bottom: 1.5rem;
    }
    .logo {
      width: 180px;
      height: auto;
      margin-bottom: 2rem;
    }
    .loading {
      display: inline-block;
      width: 50px;
      height: 50px;
      border: 3px solid rgba(26, 86, 219, 0.3);
      border-radius: 50%;
      border-top-color: #1a56db;
      animation: spin 1s ease-in-out infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .error-details {
      background-color: #f0f0f0;
      padding: 1rem;
      border-radius: 4px;
      margin-top: 1rem;
      text-align: left;
      font-family: monospace;
      white-space: pre-wrap;
      display: none;
    }
    button {
      background-color: #1a56db;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 4px;
      font-size: 1rem;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #1e429f;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/assets/godiva-logo-C316X4_3.png" alt="GodivaTech Logo" class="logo" onerror="this.onerror=null; this.src='/godiva-logo.png';">
    <h1>GodivaTech is Loading...</h1>
    <div class="loading"></div>
    <p>If the site doesn't load within a few seconds, please try refreshing the page.</p>
    <div>
      <button onclick="window.location.reload()">Refresh Page</button>
      <button onclick="checkConsoleErrors()">Show Diagnostic Info</button>
    </div>
    <div id="error-details" class="error-details"></div>
  </div>

  <script>
    // Auto-redirect to the app after a short delay
    setTimeout(function() {
      window.location.href = '/#/';
    }, 3000);

    // Function to check for console errors
    function checkConsoleErrors() {
      const errorDetails = document.getElementById('error-details');
      errorDetails.style.display = 'block';
      
      // Add browser and environment information
      const browserInfo = `
Browser: ${navigator.userAgent}
Screen: ${window.screen.width}x${window.screen.height}
URL: ${window.location.href}
Time: ${new Date().toISOString()}
      `;
      
      errorDetails.textContent = 'Diagnostic Information:\n' + browserInfo;
      
      // Check for common issues
      try {
        // Test localStorage
        localStorage.setItem('test', 'test');
        localStorage.removeItem('test');
        errorDetails.textContent += '\nLocalStorage: Working';
      } catch (e) {
        errorDetails.textContent += '\nLocalStorage: Error - ' + e.message;
      }
      
      // Add more diagnostics as needed
    }
  </script>
</body>
</html>
